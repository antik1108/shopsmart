name: CI with Discord Notification

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Server Dependencies
        run: cd server && npm install

      - name: Install Client Dependencies
        run: cd client && npm install

      - name: Run Server Tests
        run: cd server && npm run test

      - name: Run Client Tests
        run: cd client && npm run test

      - name: Send Discord Success Message
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{\"embeds\": [{\"title\": \"✅ Build Passed\", \"color\": 3066993, \"fields\": [{\"name\": \"Repository\", \"value\": \"${{ github.repository }}\", \"inline\": true}, {\"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true}, {\"name\": \"Commit\", \"value\": \"[\`${{ github.sha }}\`](${{ github.event.head_commit.url }})\", \"inline\": false}, {\"name\": \"Message\", \"value\": \"${{ github.event.head_commit.message }}\", \"inline\": false}, {\"name\": \"Author\", \"value\": \"${{ github.event.head_commit.author.name }}\", \"inline\": true}, {\"name\": \"Workflow\", \"value\": \"[View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": true}], \"timestamp\": \"${{ github.event.head_commit.timestamp }}\"}]}" \
          ${{ secrets.DISCORD_WEBHOOK }}

      - name: Send Discord Failure Message
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{\"embeds\": [{\"title\": \"❌ Build Failed\", \"color\": 15158332, \"fields\": [{\"name\": \"Repository\", \"value\": \"${{ github.repository }}\", \"inline\": true}, {\"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true}, {\"name\": \"Commit\", \"value\": \"[\`${{ github.sha }}\`](${{ github.event.head_commit.url }})\", \"inline\": false}, {\"name\": \"Message\", \"value\": \"${{ github.event.head_commit.message }}\", \"inline\": false}, {\"name\": \"Author\", \"value\": \"${{ github.event.head_commit.author.name }}\", \"inline\": true}, {\"name\": \"Workflow\", \"value\": \"[View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": true}], \"description\": \"Please check the workflow logs for details.\", \"timestamp\": \"${{ github.event.head_commit.timestamp }}\"}]}" \
          ${{ secrets.DISCORD_WEBHOOK }}
