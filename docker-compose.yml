services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=development
    volumes:
      - ./server:/app
      - /app/node_modules # Prevent host from overwriting container's node_modules
    command: npm run dev # Use nodemon for development

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - API_URL=http://server:5001
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server
